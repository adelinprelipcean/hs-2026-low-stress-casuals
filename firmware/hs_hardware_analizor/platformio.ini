; =============================================================================
; ESP32-C3 Logic Analyzer – PlatformIO Configuration
; =============================================================================
; Target  : ESP32-C3-DevKitM-1 (Super Mini compatible)
; Protocol: SUMP (Openbench Logic Sniffer) over USB-Serial-JTAG
; Client  : PulseView / sigrok
;
; Channels:
;   CH0 = GPIO5   (GPSPI2 SPID)
;   CH1 = GPIO6   (GPSPI2 SPIQ)
;   CH2 = GPIO1   (GPSPI2 SPIWP)
;   CH3 = disabled (-1)
;
; Max sample rate : 80 MHz  (APB_CLK / 1)
; Max sample count: ~60,000 (limited by free internal SRAM)
; =============================================================================

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 160000000L

; ---------- Library configuration ----------
; Use the flattened C3-only library under lib/
; The old multi-target `logic_analyzer/` directory is excluded.
lib_extra_dirs = lib
lib_ignore = logic_analyzer

build_flags =
    ; --- USB Serial / JTAG as SUMP transport ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

    ; --- Suppress all logging (corrupts SUMP binary protocol) ---
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_LOG_DEFAULT_LEVEL=0

    ; --- SUMP protocol enable ---
    -D CONFIG_ANALYZER_USE_SUMP=1

    ; --- Serial transport: USB-Serial-JTAG (not UART) ---
    -D CONFIG_ANALYZER_USE_USB_SERIAL_JTAG=1
    -D CONFIG_ANALYZER_UART_PORT_NUMBER=0
    -D CONFIG_ANALYZER_UART_PORT_BAUD_RATE=115200
    -D CONFIG_ANALYZER_UART_PORT_TX_PIN=21
    -D CONFIG_ANALYZER_UART_PORT_RX_PIN=20

    ; --- Channel → GPIO mapping ---
    -D CONFIG_ANALYZER_USE_PORT_ASSIGN=1
    -D CONFIG_ANALYZER_CHAN_0=5
    -D CONFIG_ANALYZER_CHAN_1=6
    -D CONFIG_ANALYZER_CHAN_2=1
    -D CONFIG_ANALYZER_CHAN_3=-1
    -D CONFIG_ANALYZER_CHAN_4=-1
    -D CONFIG_ANALYZER_CHAN_5=-1
    -D CONFIG_ANALYZER_CHAN_6=-1
    -D CONFIG_ANALYZER_CHAN_7=-1
    -D CONFIG_ANALYZER_CHAN_8=-1
    -D CONFIG_ANALYZER_CHAN_9=-1
    -D CONFIG_ANALYZER_CHAN_10=-1
    -D CONFIG_ANALYZER_CHAN_11=-1
    -D CONFIG_ANALYZER_CHAN_12=-1
    -D CONFIG_ANALYZER_CHAN_13=-1
    -D CONFIG_ANALYZER_CHAN_14=-1
    -D CONFIG_ANALYZER_CHAN_15=-1

    ; --- Trigger ---
    -D CONFIG_ANALYZER_TRIG_PIN=-1
    -D CONFIG_ANALYZER_TRIG_EDGE=1

    ; --- Sampling defaults ---
    -D CONFIG_ANALYZER_SAMPLES_COUNT=1000
    -D CONFIG_ANALYZER_SAMPLE_RATE=1000000
    -D CONFIG_ANALYZER_TIMEOUT=20000
    -D CONFIG_ANALYZER_CHANNELS=8
    -D CONFIG_ANALYZER_PSRAM=0

    ; --- Include paths for the C3 library ---
    -I lib/logic_analyzer_c3/include
    -I lib/logic_analyzer_c3/private_include
